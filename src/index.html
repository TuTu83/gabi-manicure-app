<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=375,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="format-detection" content="telephone=no,address=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />
    <meta name="theme-color" content="#e8558f" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Gabi Manicure</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Fixa o fontSize do HTML para evitar alterações por scripts de layout
      (function() {
        var html = document.documentElement;
        html.style.fontSize = '18px';
        Object.defineProperty(html.style, 'fontSize', {
          get: function() { return '18px'; },
          set: function() { /* Ignorar qualquer alteração */ }
        });
      })();
      <%= htmlWebpackPlugin.options.script %>
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function() {
        try {
          if (!('serviceWorker' in navigator)) return;
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').catch(function(err) {
              console.warn('[PWA] falha ao registrar service worker', err);
            });
          });
        } catch (e) {}
      })();
    </script>
  </body>
</html>
